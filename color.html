<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CTF Setup - Choose Character Color</title>
    <link rel="stylesheet" href="./assets/styles.css" />
  </head>
  <body>
    <main class="page">
      <section class="card">
        <h1>Capture The Flag Setup</h1>
        <p class="note">Step 1 / 3: Pick your character color.</p>

        <div class="grid">
          <label for="colorPicker">Character color</label>
          <input id="colorPicker" type="color" value="#34d399" />
          <div id="preview" class="color-preview"></div>
          <button id="continueBtn">Continue</button>
        </div>
      </section>
    </main>

    <script type="module">
      import { loadProfile, saveProfile } from './src/common.js';
      const picker = document.getElementById('colorPicker');
      const preview = document.getElementById('preview');
      const btn = document.getElementById('continueBtn');

      const existing = loadProfile();
      picker.value = existing.color || '#34d399';
      preview.style.background = picker.value;

      picker.addEventListener('input', () => {
        preview.style.background = picker.value;
      });

      btn.addEventListener('click', () => {
        saveProfile({ color: picker.value });
        location.href = './join.html';
      });
    </script>
  </body>
</html>
